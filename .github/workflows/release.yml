name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # spear-gen — Deployment target: airgapped Linux (musl static binary).
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: spear-gen-linux-x86_64-musl
            musl: true
            crate: spear-gen
            binary: spear-gen

          # spear-gen — Developer convenience targets.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: spear-gen-linux-x86_64
            musl: false
            crate: spear-gen
            binary: spear-gen

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: spear-gen-macos-arm64
            musl: false
            crate: spear-gen
            binary: spear-gen

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: spear-gen-macos-x86_64
            musl: false
            crate: spear-gen
            binary: spear-gen

          # header-gen — Linux x86_64 glibc (self-contained via static LLVM,
          # not musl).  libclang-dev provides the static libs at build time;
          # the resulting binary has no libclang runtime dependency.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: header-gen-linux-x86_64
            musl: false
            crate: header-gen
            binary: header-gen
            llvm: true

    steps:
      - uses: actions/checkout@v4

      # rdkafka requires cmake + curl headers on Linux (both gnu and musl builds).
      - name: Install build dependencies (Linux, non-LLVM)
        if: matrix.os == 'ubuntu-latest' && !matrix.llvm
        run: sudo apt-get update && sudo apt-get install -y cmake libcurl4-openssl-dev musl-tools

      # header-gen requires LLVM dev packages for static libclang linking.
      - name: Install build dependencies (Linux, LLVM)
        if: matrix.os == 'ubuntu-latest' && matrix.llvm
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ matrix.crate }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-${{ matrix.crate }}-cargo-

      - name: Build (spear-gen)
        if: "!matrix.llvm"
        run: cargo build --release --target ${{ matrix.target }} -p ${{ matrix.crate }}

      - name: Build (header-gen, static LLVM)
        if: matrix.llvm
        run: cargo build --release --target ${{ matrix.target }} -p ${{ matrix.crate }} --features static-clang

      - name: Verify header-gen has no libclang runtime dependency
        if: matrix.llvm && matrix.os == 'ubuntu-latest'
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          echo "ldd output:"
          ldd "${BINARY}"
          if ldd "${BINARY}" | grep -q libclang; then
            echo "ERROR: binary is dynamically linked against libclang — static linking failed"
            exit 1
          fi
          echo "OK: no libclang runtime dependency"

      - name: Package
        run: |
          TARBALL="${{ matrix.artifact }}-${{ github.ref_name }}.tar.gz"
          cd target/${{ matrix.target }}/release
          tar -czvf "../../../${TARBALL}" ${{ matrix.binary }}
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ github.ref_name }}
          path: ${{ matrix.artifact }}-${{ github.ref_name }}.tar.gz
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
