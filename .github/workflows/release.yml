name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # spear-gen — Deployment target: airgapped Linux (musl static binary).
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: spear-gen-linux-x86_64-musl
            musl: true
            crate: spear-gen
            binary: spear-gen

          # spear-gen — Developer convenience targets.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: spear-gen-linux-x86_64
            musl: false
            crate: spear-gen
            binary: spear-gen

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: spear-gen-macos-arm64
            musl: false
            crate: spear-gen
            binary: spear-gen

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: spear-gen-macos-x86_64
            musl: false
            crate: spear-gen
            binary: spear-gen

          # header-gen — Linux x86_64.  Bundles libclang.so alongside the binary
          # (patchelf RPATH=$ORIGIN) so the deployment machine needs no libclang
          # system package.  Ubuntu does not ship the monolithic libclang.a so
          # fully-static linking is not achievable via apt packages.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: header-gen-linux-x86_64
            musl: false
            crate: header-gen
            binary: header-gen
            llvm: true

    steps:
      - uses: actions/checkout@v4

      # rdkafka requires cmake + curl headers on Linux (both gnu and musl builds).
      - name: Install build dependencies (Linux, non-LLVM)
        if: matrix.os == 'ubuntu-latest' && !matrix.llvm
        run: sudo apt-get update && sudo apt-get install -y cmake libcurl4-openssl-dev musl-tools

      # header-gen: libclang-dev for the shared library + patchelf to set RPATH.
      - name: Install build dependencies (Linux, LLVM)
        if: matrix.os == 'ubuntu-latest' && matrix.llvm
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ matrix.crate }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-${{ matrix.crate }}-cargo-

      - name: Build (spear-gen)
        if: "!matrix.llvm"
        run: cargo build --release --target ${{ matrix.target }} -p ${{ matrix.crate }}

      - name: Build (header-gen)
        if: matrix.llvm
        run: |
          LLVM_CONFIG=$(ls /usr/bin/llvm-config-* 2>/dev/null | sort -V | tail -1)
          LIBCLANG_PATH=$(${LLVM_CONFIG} --libdir)
          echo "LIBCLANG_PATH=${LIBCLANG_PATH}"
          LIBCLANG_PATH="${LIBCLANG_PATH}" \
            cargo build --release --target ${{ matrix.target }} -p ${{ matrix.crate }}

      # Bundle libclang.so + libLLVM.so alongside the binary.
      # libclang-18.so.18 depends on libLLVM.so.18.1, so both must travel together.
      # patchelf sets RPATH=$ORIGIN on the binary and on libclang so each finds
      # its dependency in the same directory — no system LLVM install needed.
      - name: Bundle libclang and patch RPATH (header-gen)
        if: matrix.llvm
        run: |
          LLVM_CONFIG=$(ls /usr/bin/llvm-config-* 2>/dev/null | sort -V | tail -1)
          LIBDIR=$(${LLVM_CONFIG} --libdir)
          RELDIR="target/${{ matrix.target }}/release"
          BINARY="${RELDIR}/${{ matrix.binary }}"

          # Find the versioned libclang shared library (e.g. libclang-18.so.18)
          LIBCLANG_SO=$(ls ${LIBDIR}/libclang-*.so.* 2>/dev/null | head -1)
          if [ -z "${LIBCLANG_SO}" ]; then
            LIBCLANG_SO="${LIBDIR}/libclang.so"
          fi
          echo "Bundling libclang: ${LIBCLANG_SO}"
          cp "${LIBCLANG_SO}" "${RELDIR}/"

          # Find the monolithic libLLVM shared library (e.g. libLLVM.so.18.1 or libLLVM-18.so)
          LIBLLVM_SO=$(ls ${LIBDIR}/libLLVM.so.* 2>/dev/null | head -1)
          if [ -z "${LIBLLVM_SO}" ]; then
            LIBLLVM_SO=$(ls ${LIBDIR}/libLLVM-*.so 2>/dev/null | head -1 || true)
          fi
          if [ -n "${LIBLLVM_SO}" ]; then
            echo "Bundling libLLVM: ${LIBLLVM_SO}"
            cp "${LIBLLVM_SO}" "${RELDIR}/"
          else
            echo "WARNING: libLLVM.so not found in ${LIBDIR}"
          fi

          # Patch RPATH on the binary and on libclang so each finds its deps next to itself.
          patchelf --set-rpath '$ORIGIN' "${BINARY}"
          patchelf --set-rpath '$ORIGIN' "${RELDIR}/$(basename "${LIBCLANG_SO}")"

          echo "=== ldd: header-gen ==="
          ldd "${BINARY}"
          echo "=== ldd: libclang ==="
          ldd "${RELDIR}/$(basename "${LIBCLANG_SO}")"
          if [ -n "${LIBLLVM_SO:-}" ]; then
            echo "=== ldd: libLLVM ==="
            ldd "${RELDIR}/$(basename "${LIBLLVM_SO}")"
          fi

      - name: Package
        run: |
          TARBALL="${{ matrix.artifact }}-${{ github.ref_name }}.tar.gz"
          cd target/${{ matrix.target }}/release
          if [ "${{ matrix.llvm }}" = "true" ]; then
            # Include the binary + bundled libclang + bundled libLLVM
            tar -czvf "../../../${TARBALL}" ${{ matrix.binary }} libclang-*.so.* libLLVM*.so* 2>/dev/null \
              || tar -czvf "../../../${TARBALL}" ${{ matrix.binary }} libclang.so
          else
            tar -czvf "../../../${TARBALL}" ${{ matrix.binary }}
          fi
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ github.ref_name }}
          path: ${{ matrix.artifact }}-${{ github.ref_name }}.tar.gz
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
