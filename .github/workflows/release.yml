name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Deployment target — airgapped Linux environments.
          # cmake + libcurl4-openssl-dev are already installed for all Linux
          # jobs below. No changes needed when spear-gateway is added.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: spear-gen-linux-x86_64-musl
            musl: true

          # Developer convenience targets.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: spear-gen-linux-x86_64
            musl: false

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: spear-gen-macos-arm64
            musl: false

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: spear-gen-macos-x86_64
            musl: false

    steps:
      - uses: actions/checkout@v4

      # rdkafka requires cmake + curl headers on Linux (both gnu and musl builds).
      - name: Install build dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y cmake libcurl4-openssl-dev musl-tools

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p spear-gen

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../${{ matrix.artifact }}.tar.gz spear-gen
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
