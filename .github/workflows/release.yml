name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # spear-gen — Deployment target: airgapped Linux (musl static binary).
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: spear-gen-linux-x86_64-musl
            musl: true
            crate: spear-gen
            binary: spear-gen

          # spear-gen — Developer convenience targets.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: spear-gen-linux-x86_64
            musl: false
            crate: spear-gen
            binary: spear-gen

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: spear-gen-macos-arm64
            musl: false
            crate: spear-gen
            binary: spear-gen

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: spear-gen-macos-x86_64
            musl: false
            crate: spear-gen
            binary: spear-gen

          # header-gen is NOT released as a standalone binary.
          # It is deployed via the spear-dev container image which bundles
          # libclang at the OS level — no bundling or RPATH tricks needed.

    steps:
      - uses: actions/checkout@v4

      # rdkafka requires cmake + curl headers on Linux (both gnu and musl builds).
      - name: Install build dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y cmake libcurl4-openssl-dev musl-tools

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ matrix.crate }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-${{ matrix.crate }}-cargo-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p ${{ matrix.crate }}

      - name: Package
        run: |
          TARBALL="${{ matrix.artifact }}-${{ github.ref_name }}.tar.gz"
          cd target/${{ matrix.target }}/release
          tar -czvf "../../../${TARBALL}" ${{ matrix.binary }}
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ github.ref_name }}
          path: ${{ matrix.artifact }}-${{ github.ref_name }}.tar.gz
          if-no-files-found: error

  build-image:
    name: Build Container Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libcurl4-openssl-dev llvm-dev libclang-dev clang

      - name: Vendor dependencies
        run: cargo vendor vendor/

      - name: Build and save image
        run: |
          VERSION=$(grep '^version' crates/spear-gen/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          docker build --platform linux/amd64 -t "spear-dev:${VERSION}" .
          docker save "spear-dev:${VERSION}" | gzip > "spear-dev-${{ github.ref_name }}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spear-dev-image-${{ github.ref_name }}
          path: spear-dev-${{ github.ref_name }}.tar.gz
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build, build-image]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
